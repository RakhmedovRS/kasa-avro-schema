version: 2.1

executors:
  java-executor:
    docker:
      - image: cimg/openjdk:17.0
    working_directory: ~/project

jobs:
  build-and-release:
    executor: java-executor
    steps:
      # Install jq for JSON parsing
      - run:
          name: Install jq
          command: sudo apt-get update && sudo apt-get install -y jq

      # Clone repository via HTTPS with token
      - run:
          name: Clone repository
          command: |
            git clone https://$GH_TOKEN@github.com/RakhmedovRS/kasa-avro-schema.git ~/project

      # Restore Maven cache
      - restore_cache:
          keys:
            - maven-cache-{{ checksum "pom.xml" }}
            - maven-cache

      # Build project
      - run:
          name: Build with Maven
          command: |
            cd ~/project
            mvn clean package -DskipTests

      # Save Maven cache
      - save_cache:
          paths:
            - ~/.m2/repository
          key: maven-cache-{{ checksum "pom.xml" }}

      # Store artifacts in CircleCI (optional)
      - store_artifacts:
          path: ~/project/target
          destination: build-artifacts

      # Store test results (optional)
      - store_test_results:
          path: ~/project/target/surefire-reports

      # Create GitHub Release and upload JAR
      - run:
          name: Create GitHub Release and upload JAR
          command: |
            cd ~/project

            ARTIFACT=$(ls target/*.jar | head -n 1)
            if [ -z "$ARTIFACT" ]; then
              echo "No JAR found"
              exit 1
            fi

            TAG_NAME="v$(date +%Y%m%d%H%M%S)"
            echo "Creating release $TAG_NAME"

            RESPONSE=$(curl -s -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"tag_name\":\"$TAG_NAME\",\"name\":\"$TAG_NAME\"}" \
              https://api.github.com/repos/RakhmedovRS/kasa-avro-schema/releases)

            UPLOAD_URL=$(echo $RESPONSE | jq -r .upload_url | sed 's/{?name,label}//')

            curl -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/java-archive" \
              --data-binary @"$ARTIFACT" \
              "$UPLOAD_URL?name=$(basename $ARTIFACT)"

      # ✅ FIXED: clean echo-based settings.xml (no YAML issues)
      - run:
          name: Configure Maven
          command: |
            mkdir -p ~/.m2
            echo "<settings>" > ~/.m2/settings.xml
            echo "  <servers>" >> ~/.m2/settings.xml
            echo "    <server>" >> ~/.m2/settings.xml
            echo "      <id>github</id>" >> ~/.m2/settings.xml
            echo "      <username>RakhmedovRS</username>" >> ~/.m2/settings.xml
            echo "      <password>${GH_TOKEN}</password>" >> ~/.m2/settings.xml
            echo "    </server>" >> ~/.m2/settings.xml
            echo "  </servers>" >> ~/.m2/settings.xml
            echo "</settings>" >> ~/.m2/settings.xml

      # Deploy to GitHub Packages
      - run:
          name: Deploy to GitHub Packages
          command: |
            cd ~/project
            mvn deploy -DskipTests

workflows:
  version: 2
  build-and-release-workflow:
    jobs:
      - build-and-release