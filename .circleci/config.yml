version: 2.1

executors:
  java-executor:
    docker:
      - image: cimg/openjdk:17.0
    working_directory: ~/project

jobs:
  build:
    executor: java-executor
    steps:
      # Manually clone repo via HTTPS with GitHub token
      - run:
          name: Clone repository via HTTPS
          command: |
            git clone https://$GH_TOKEN@github.com/RakhmedovRS/kasa-avro-schema.git ~/project
            cd ~/project

      # Restore Maven dependencies cache
      - restore_cache:
          keys:
            - maven-cache-{{ checksum "pom.xml" }}
            - maven-cache

      # Build and test in one step
      - run:
          name: Build and test
          command: |
            cd ~/project
            mvn clean package

      # Save Maven cache
      - save_cache:
          paths:
            - ~/.m2/repository
          key: maven-cache-{{ checksum "pom.xml" }}

      # Save build artifacts
      - store_artifacts:
          path: ~/project/target
          destination: build-artifacts

      # Upload test results
      - store_test_results:
          path: ~/project/target/surefire-reports

workflows:
  version: 2
  build_and_test:
    jobs:
      - build